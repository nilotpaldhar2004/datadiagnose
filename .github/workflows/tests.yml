# ============================================================
# DataDiagnose — Automated Test Runner (v1.0.1)
# ============================================================

name: Run Tests

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: quick-check (The "Smoke Test")
  # Runs first to provide fast feedback.
  # ──────────────────────────────────────────────────────────
  quick-check:
    name: "Quick Check — Ubuntu + Py3.11"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest -e .
      - name: Smoke test & Examples
        run: |
          pytest tests/test_core.py -v --tb=short
          python examples/basic_usage.py
          python examples/student_dataset_demo.py

  # ──────────────────────────────────────────────────────────
  # JOB 2: lint (Code Quality)
  # Respects the .flake8 configuration file.
  # ──────────────────────────────────────────────────────────
  lint:
    name: "Lint — flake8 style check"
    needs: quick-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        # We removed --max-line-length to use your .flake8 config (130 chars)
        run: |
          flake8 datadiagnose/ tests/ --count --statistics

  # ──────────────────────────────────────────────────────────
  # JOB 3: test (Full Matrix)
  # Tests every OS and Python version combination.
  # ──────────────────────────────────────────────────────────
  test:
    name: "Test — ${{ matrix.python-version }} on ${{ matrix.os }}"
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov -e .
      - name: Run full suite with coverage
        run: |
          pytest tests/ --cov=datadiagnose --cov-report=term-missing --tb=short